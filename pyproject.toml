[tool.black]
line-length = 127
target-version = ['py312']
# Explicitly tell black to NEVER look inside these folders
extend-exclude = '''
/(
  venv
  | postgres_data
  | .github
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 127
# Tell isort to skip the data folder too
skip = ["venv", "postgres_data"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
explicit_package_bases = true
exclude = ["venv", "postgres_data"]